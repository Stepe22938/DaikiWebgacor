kind = "web"
previewPath = "/"
title = "MC Roleplay Server"
version = "1.0.0"
id = "artifacts/mc-roleplay"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24628

[services.development]
run = "pnpm --filter @workspace/mc-roleplay run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mc-roleplay", "run", "build" ]
publicDir = "artifacts/mc-roleplay/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24628"
BASE_PATH = "/"
