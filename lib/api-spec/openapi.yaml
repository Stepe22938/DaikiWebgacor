openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MC Roleplay Server API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: developments
    description: Server development items
  - name: announcements
    description: Server announcements
  - name: users
    description: User management
  - name: stats
    description: Server stats
  - name: follows
    description: Follow system
  - name: messaging
    description: Chat and messaging
  - name: settings
    description: User settings
  - name: credits
    description: Server credits system
  - name: badges
    description: Profile badge system
  - name: forms
    description: Forms and Voting system

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/switchable:
    get:
      operationId: listSwitchableUsers
      tags: [users]
      summary: List all switchable users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"


  /users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [users]
      summary: Update user role (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRoleUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /members:
    get:
      operationId: listMembers
      tags: [users]
      summary: List all members with follow status (authenticated)
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"

  /members/{id}:
    get:
      operationId: getPublicProfile
      tags: [users]
      summary: Get public member profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Public member profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicUser"

  /members/{id}/followers:
    get:
      operationId: getPublicProfileFollowers
      tags: [users]
      summary: Get followers of a public member profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Public member followers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"

  /members/{id}/following:
    get:
      operationId: getPublicProfileFollowing
      tags: [users]
      summary: Get accounts followed by a public member profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Public member following
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"

  /members/{id}/badges:
    get:
      operationId: getPublicProfileBadges
      tags: [badges]
      summary: Get badges assigned to a public member profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Public member badges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Badge"

  /follows:
    post:
      operationId: followUser
      tags: [follows]
      summary: Follow a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FollowInput"
      responses:
        "201":
          description: Followed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowResult"

  /follows/{userId}:
    delete:
      operationId: unfollowUser
      tags: [follows]
      summary: Unfollow a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Unfollowed

  /me/following:
    get:
      operationId: getMyFollowing
      tags: [follows]
      summary: Get list of users I follow
      responses:
        "200":
          description: Following list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"

  /me/followers:
    get:
      operationId: getMyFollowers
      tags: [follows]
      summary: Get list of users following me
      responses:
        "200":
          description: Followers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"

  /developments:
    get:
      operationId: listDevelopments
      tags: [developments]
      summary: List all server developments
      responses:
        "200":
          description: List of developments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Development"
    post:
      operationId: createDevelopment
      tags: [developments]
      summary: Create a development item (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DevelopmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Development"

  /developments/{id}:
    get:
      operationId: getDevelopment
      tags: [developments]
      summary: Get a development item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Development item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Development"
    patch:
      operationId: updateDevelopment
      tags: [developments]
      summary: Update a development item (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DevelopmentUpdate"
      responses:
        "200":
          description: Updated development
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Development"
    delete:
      operationId: deleteDevelopment
      tags: [developments]
      summary: Delete a development item (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List announcements
      responses:
        "200":
          description: List of announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create an announcement (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /announcements/{id}:
    get:
      operationId: getAnnouncement
      tags: [announcements]
      summary: Get an announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
    patch:
      operationId: updateAnnouncement
      tags: [announcements]
      summary: Update an announcement (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementUpdate"
      responses:
        "200":
          description: Updated announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete an announcement (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/follows:
    post:
      operationId: adminCreateFollow
      tags: [follows]
      summary: Force a follow between two users (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminFollowInput"
      responses:
        "201":
          description: Follow created

  /admin/bulk-followers:
    post:
      operationId: adminBulkCreateFollowers
      tags: [follows]
      summary: Generate N bot accounts and auto-follow a target user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminBulkFollowInput"
      responses:
        "201":
          description: Bulk followers created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBulkFollowResult"

  /admin/users/{id}:
    patch:
      operationId: adminUpdateUser
      tags: [users]
      summary: Edit any user profile (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: adminDeleteUser
      tags: [users]
      summary: Delete a user profile (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: User deleted successfully

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get server stats
      responses:
        "200":
          description: Server stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerStats"

  /me/settings:
    get:
      operationId: getMySettings
      tags: [settings]
      summary: Get current user settings
      responses:
        "200":
          description: User settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
    patch:
      operationId: updateMySettings
      tags: [settings]
      summary: Update current user settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"

  /conversations:
    get:
      operationId: listConversations
      tags: [messaging]
      summary: List my conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationSummary"
    post:
      operationId: createGroup
      tags: [messaging]
      summary: Create a group conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupInput"
      responses:
        "201":
          description: Created group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationSummary"

  /conversations/dm:
    post:
      operationId: createOrGetDm
      tags: [messaging]
      summary: Start or get existing DM conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDmInput"
      responses:
        "200":
          description: Existing or new DM conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationSummary"

  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [messaging]
      summary: Get conversation details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationSummary"
    patch:
      operationId: updateGroup
      tags: [messaging]
      summary: Update group name or icon
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGroupInput"
      responses:
        "200":
          description: Updated conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationSummary"
    delete:
      operationId: deleteConversation
      tags: [messaging]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /conversations/{id}/messages:
    get:
      operationId: listMessages
      tags: [messaging]
      summary: Get messages in a conversation (last 50)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messaging]
      summary: Send a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageInput"
      responses:
        "201":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /conversations/{id}/messages/{messageId}:
    delete:
      operationId: deleteMessage
      tags: [messaging]
      summary: Delete a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /conversations/{id}/members:
    get:
      operationId: listConversationMembers
      tags: [messaging]
      summary: List members of a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationMemberInfo"
    post:
      operationId: addConversationMember
      tags: [messaging]
      summary: Add a member to a group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberInput"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationMemberInfo"

  /conversations/{id}/members/{userId}:
    delete:
      operationId: removeConversationMember
      tags: [messaging]
      summary: Remove a member from a group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /me/friends:
    get:
      operationId: getMyFriends
      tags: [follows]
      summary: Get mutual followers (friends)
      responses:
        "200":
          description: Friends list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"
  /tickets:
    get:
      operationId: listTickets
      tags: [tickets]
      summary: List support tickets (admins see all, users see their own)
      responses:
        "200":
          description: List of tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
    post:
      operationId: createTicket
      tags: [tickets]
      summary: Create a support ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketInput"
      responses:
        "201":
          description: Created ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /ticket-reasons:
    get:
      operationId: listTicketReasons
      tags: [tickets]
      summary: List active support ticket reasons
      responses:
        "200":
          description: List of active ticket reasons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TicketReason"

  /admin/ticket-reasons:
    get:
      operationId: listAdminTicketReasons
      tags: [tickets]
      summary: List all support ticket reasons (admin only)
      responses:
        "200":
          description: List of all ticket reasons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TicketReason"
    post:
      operationId: createTicketReason
      tags: [tickets]
      summary: Create a support ticket reason (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketReasonInput"
      responses:
        "201":
          description: Created ticket reason
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketReason"

  /admin/ticket-reasons/{id}:
    patch:
      operationId: updateTicketReason
      tags: [tickets]
      summary: Update a support ticket reason (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketReasonUpdate"
      responses:
        "200":
          description: Updated ticket reason
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketReason"
    delete:
      operationId: deleteTicketReason
      tags: [tickets]
      summary: Delete a support ticket reason (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted ticket reason

  /tickets/{id}:
    patch:
      operationId: updateTicket
      tags: [tickets]
      summary: Update ticket status or assigned admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTicketInput"
      responses:
        "200":
          description: Updated ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}/messages:
    get:
      operationId: listTicketMessages
      tags: [tickets]
      summary: List replies of a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of ticket replies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TicketMessage"
    post:
      operationId: sendTicketMessage
      tags: [tickets]
      summary: Send a reply/message inside a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendTicketMessageInput"
      responses:
        "201":
          description: Created reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketMessage"

  /credits:
    get:
      operationId: listCredits
      tags: [credits]
      summary: List all server credits
      responses:
        "200":
          description: List of credits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Credit"
    post:
      operationId: createCredit
      tags: [credits]
      summary: Create a credit item (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCreditInput"
      responses:
        "201":
          description: Created credit item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credit"

  /credits/{id}:
    patch:
      operationId: updateCredit
      tags: [credits]
      summary: Update a credit item (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCreditInput"
      responses:
        "200":
          description: Updated credit item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credit"
    delete:
      operationId: deleteCredit
      tags: [credits]
      summary: Delete a credit item (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /badges:
    get:
      operationId: listBadges
      tags: [badges]
      summary: List all available profile badges
      responses:
        "200":
          description: List of badges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Badge"

  /admin/users/{id}/badges:
    post:
      operationId: assignUserBadge
      tags: [badges]
      summary: Assign a badge to a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignBadgeInput"
      responses:
        "201":
          description: Assigned badge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Badge"

  /admin/users/{id}/badges/{badgeId}:
    delete:
      operationId: removeUserBadge
      tags: [badges]
      summary: Remove a badge from a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: badgeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed badge

  /forms:
    get:
      operationId: listForms
      tags: [forms]
      summary: List forms and polls (admin sees all, members see open only)
      responses:
        "200":
          description: List of forms/polls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FormSummary"
    post:
      operationId: createForm
      tags: [forms]
      summary: Admin creates a form or poll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFormInput"
      responses:
        "201":
          description: Created form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormDetail"

  /forms/{id}:
    get:
      operationId: getForm
      tags: [forms]
      summary: Get form/poll detail including fields or options
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Form detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormDetail"
    patch:
      operationId: updateForm
      tags: [forms]
      summary: Admin updates a form/poll
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFormInput"
      responses:
        "200":
          description: Updated form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormDetail"
    delete:
      operationId: deleteForm
      tags: [forms]
      summary: Admin deletes a form/poll
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /forms/{id}/vote:
    post:
      operationId: submitVote
      tags: [forms]
      summary: Member votes on a poll
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitVoteInput"
      responses:
        "201":
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormResponse"

  /forms/{id}/submit:
    post:
      operationId: submitForm
      tags: [forms]
      summary: Member submits a form response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitFormInput"
      responses:
        "201":
          description: Submission recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormResponse"

  /forms/{id}/responses:
    get:
      operationId: listFormResponses
      tags: [forms]
      summary: Admin views all responses or vote results for a form/poll
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Form responses or poll results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormResponsesResult"

  /forms/{id}/my-response:
    get:
      operationId: getMyFormResponse
      tags: [forms]
      summary: Check if current user has responded to a form/poll
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User response or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyFormResponse"

