openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MC Roleplay Server API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: developments
    description: Server development items
  - name: announcements
    description: Server announcements
  - name: users
    description: User management
  - name: stats
    description: Server stats
  - name: follows
    description: Follow system

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [users]
      summary: Update user role (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRoleUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /members:
    get:
      operationId: listMembers
      tags: [users]
      summary: List all members with follow status (authenticated)
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"

  /follows:
    post:
      operationId: followUser
      tags: [follows]
      summary: Follow a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FollowInput"
      responses:
        "201":
          description: Followed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowResult"

  /follows/{userId}:
    delete:
      operationId: unfollowUser
      tags: [follows]
      summary: Unfollow a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Unfollowed

  /me/following:
    get:
      operationId: getMyFollowing
      tags: [follows]
      summary: Get list of users I follow
      responses:
        "200":
          description: Following list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"

  /me/followers:
    get:
      operationId: getMyFollowers
      tags: [follows]
      summary: Get list of users following me
      responses:
        "200":
          description: Followers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"

  /developments:
    get:
      operationId: listDevelopments
      tags: [developments]
      summary: List all server developments
      responses:
        "200":
          description: List of developments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Development"
    post:
      operationId: createDevelopment
      tags: [developments]
      summary: Create a development item (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DevelopmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Development"

  /developments/{id}:
    get:
      operationId: getDevelopment
      tags: [developments]
      summary: Get a development item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Development item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Development"
    patch:
      operationId: updateDevelopment
      tags: [developments]
      summary: Update a development item (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DevelopmentUpdate"
      responses:
        "200":
          description: Updated development
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Development"
    delete:
      operationId: deleteDevelopment
      tags: [developments]
      summary: Delete a development item (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List announcements
      responses:
        "200":
          description: List of announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create an announcement (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /announcements/{id}:
    get:
      operationId: getAnnouncement
      tags: [announcements]
      summary: Get an announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
    patch:
      operationId: updateAnnouncement
      tags: [announcements]
      summary: Update an announcement (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementUpdate"
      responses:
        "200":
          description: Updated announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete an announcement (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/follows:
    post:
      operationId: adminCreateFollow
      tags: [follows]
      summary: Force a follow between two users (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminFollowInput"
      responses:
        "201":
          description: Follow created

  /admin/bulk-followers:
    post:
      operationId: adminBulkCreateFollowers
      tags: [follows]
      summary: Generate N bot accounts and auto-follow a target user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminBulkFollowInput"
      responses:
        "201":
          description: Bulk followers created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBulkFollowResult"

  /admin/users/{id}:
    patch:
      operationId: adminUpdateUser
      tags: [users]
      summary: Edit any user profile (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get server stats
      responses:
        "200":
          description: Server stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      required: [id, clerkId, username, role, createdAt]
      properties:
        id:
          type: integer
        clerkId:
          type: string
        username:
          type: string
        displayName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [member, admin]
        bio:
          type: ["string", "null"]
        createdAt:
          type: string

    UserUpdate:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: string
        username:
          type: string

    UserRoleUpdate:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [member, admin]

    PublicUser:
      type: object
      required: [id, username, createdAt, isFollowing, followerCount, followingCount]
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        createdAt:
          type: string
        isFollowing:
          type: boolean
        followerCount:
          type: integer
        followingCount:
          type: integer

    FollowInput:
      type: object
      required: [userId]
      properties:
        userId:
          type: integer

    AdminBulkFollowInput:
      type: object
      required: [targetUserId, count]
      properties:
        targetUserId:
          type: integer
        count:
          type: integer
          minimum: 1
          maximum: 10000

    AdminBulkFollowResult:
      type: object
      required: [botsCreated, followsCreated]
      properties:
        botsCreated:
          type: integer
        followsCreated:
          type: integer

    AdminUserUpdate:
      type: object
      properties:
        username:
          type: string
        displayName:
          type: string
        bio:
          type: string
        role:
          type: string
          enum: [member, admin]

    AdminFollowInput:
      type: object
      required: [followerId, followingId]
      properties:
        followerId:
          type: integer
        followingId:
          type: integer

    FollowResult:
      type: object
      required: [followerId, followingId]
      properties:
        followerId:
          type: integer
        followingId:
          type: integer

    Development:
      type: object
      required: [id, title, description, category, status, order, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        status:
          type: string
          enum: [planned, in_progress, completed, paused]
        progress:
          type: ["integer", "null"]
        iconName:
          type: ["string", "null"]
        order:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string

    DevelopmentInput:
      type: object
      required: [title, description, category, status]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        category:
          type: string
        status:
          type: string
          enum: [planned, in_progress, completed, paused]
        progress:
          type: integer
        iconName:
          type: string
        order:
          type: integer

    DevelopmentUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        category:
          type: string
        status:
          type: string
          enum: [planned, in_progress, completed, paused]
        progress:
          type: integer
        iconName:
          type: string
        order:
          type: integer

    Announcement:
      type: object
      required: [id, title, content, type, pinned, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [update, event, maintenance, general]
        pinned:
          type: boolean
        authorId:
          type: ["integer", "null"]
        authorName:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    AnnouncementInput:
      type: object
      required: [title, content, type]
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
        type:
          type: string
          enum: [update, event, maintenance, general]
        pinned:
          type: boolean

    AnnouncementUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
        type:
          type: string
          enum: [update, event, maintenance, general]
        pinned:
          type: boolean

    ServerStats:
      type: object
      required: [totalMembers, totalAnnouncements, totalDevelopments, completedDevelopments, inProgressDevelopments]
      properties:
        totalMembers:
          type: integer
        totalAnnouncements:
          type: integer
        totalDevelopments:
          type: integer
        completedDevelopments:
          type: integer
        inProgressDevelopments:
          type: integer
